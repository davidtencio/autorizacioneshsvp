name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality checks
        run: npm run lint && npm run test && npm run build && npm run bundle:check

      - name: Deploy to Firebase Hosting and Firestore Rules
        run: npx firebase-tools deploy --only firestore:rules,hosting --project hsvp-autorizaciones-7819d --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Post-deploy smoke check
        run: npm run smoke
        env:
          SMOKE_BASE_URL: https://hsvp-autorizaciones-7819d.web.app
