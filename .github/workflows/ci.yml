name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality baseline
        run: npm run quality:baseline
